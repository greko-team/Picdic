<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Joke Image Card Generator</title>
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link href="https://fonts.cdnfonts.com/css/cal-sans" rel="stylesheet">

  <style>
    * { box-sizing: border-box; }
    body { margin: 0; padding: 0; background: #0f0e0d; color: #fff; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
    textarea { resize: vertical; }
    textarea::placeholder { color: rgba(255,255,255,0.18); }
    textarea:focus { outline: none; border-color: rgba(255,200,80,0.35) !important; box-shadow: 0 0 0 3px rgba(255,200,80,0.05); }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
  </style>
</head>
<body>

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useCallback, useRef } = React;

    // Парсер: берет только тело анекдота (все строчки кроме последней)
    function parseOnlyJokes(text) {
      const blocks = text.trim().split(/\n\s*\n/);
      const jokes = [];
      for (const block of blocks) {
        const lines = block.trim().split("\n").map(l => l.trim()).filter(Boolean);
        if (lines.length < 2) continue;
        
        // Отсекаем последнюю строчку (описание)
        const jokeLines = lines.slice(0, -1);
        const jokeText = jokeLines.join("\n"); 
        jokes.push(jokeText);
      }
      return jokes;
    }

    function JokeCardPreview({ jokeText, index }) {
      const cardRef = useRef(null);
      const [isDownloading, setIsDownloading] = useState(false);

      const downloadImage = async () => {
        if (!cardRef.current || isDownloading) return;
        setIsDownloading(true);
        try {
          // Генерируем изображение высокого разрешения (масштаб х2 для четкости 2000x3000)
          const canvas = await html2canvas(cardRef.current, {
            useCORS: true,
            scale: 2, 
            logging: false,
            width: 1000,
            height: 1500
          });
          
          const dataUrl = canvas.toDataURL("image/png");
          const link = document.createElement("a");
          link.download = `joke-${String(index + 1).padStart(2, "0")}.png`;
          link.href = dataUrl;
          link.click();
        } catch (err) {
          console.error("Ошибка генерации картинки:", err);
        }
        setIsDownloading(false);
      };

      return (
        <div style={{
          background: "rgba(255,255,255,0.04)",
          border: "1px solid rgba(255,255,255,0.08)",
          borderRadius: "14px",
          padding: "16px",
          display: "flex",
          flexDirection: "column",
          gap: "12px",
          alignItems: "center"
        }}>
          {/* Контейнер-превью, который видит пользователь на экране */}
          <div style={{
            width: "100%",
            maxWidth: "240px",
            height: "360px",
            background: "#ffffff",
            borderRadius: "8px",
            overflow: "hidden",
            boxShadow: "0 10px 30px rgba(0,0,0,0.5)",
            position: "relative",
            display: "flex",
            alignItems: "center",
            justifyContent: "center",
            padding: "30px"
          }}>
            <p style={{
              margin: 0,
              color: "#000000",
              fontFamily: "'Cal Sans', sans-serif",
              fontSize: "15px",
              fontWeight: "600",
              lineHeight: "1.45",
              textAlign: "center",
              whiteSpace: "pre-line",
              wordBreak: "break-word"
            }}>
              {jokeText}
            </p>
          </div>

          {/* Кнопка скачать */}
          <button
            onClick={downloadImage}
            disabled={isDownloading}
            style={{
              width: "100%",
              maxWidth: "240px",
              background: "rgba(255,200,80,0.1)",
              border: "1px solid rgba(255,200,80,0.3)",
              color: "rgb(255,200,80)",
              borderRadius: "8px",
              padding: "10px",
              fontSize: "12px",
              fontFamily: "'DM Mono', monospace",
              cursor: isDownloading ? "not-allowed" : "pointer",
              transition: "all 0.15s",
              display: "flex",
              alignItems: "center",
              justifyContent: "center",
              gap: "6px"
            }}
          >
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v4M7 10l5 5 5-5M12 15V3"/>
            </svg>
            {isDownloading ? "Generating..." : "Download PNG"}
          </button>

          {/* СКРЫТЫЙ холст холста 1000x1500 (при scale:2 превратится ровно в 2000x3000) */}
          <div style={{ position: "absolute", left: "-9999px", top: "-9999px" }}>
            <div 
              ref={cardRef}
              style={{
                width: "1000px",
                height: "1500px",
                background: "#ffffff",
                display: "flex",
                alignItems: "center",
                justifyContent: "center",
                padding: "120px", // Большие отступы от краев, как на эталоне
                boxSizing: "border-box"
              }}
            >
              <p style={{
                margin: 0,
                color: "#000000",
                fontFamily: "'Cal Sans', sans-serif",
                fontSize: "62px", // Идеальный крупный размер для разрешения 2000х3000
                fontWeight: "600",
                lineHeight: "1.45",
                textAlign: "center",
                whiteSpace: "pre-line"
              }}>
                {jokeText}
              </p>
            </div>
          </div>
        </div>
      );
    }

    function BatchGroup({ batch, batchIndex, onRemove }) {
      return (
        <div style={{
          background: "rgba(255,255,255,0.025)",
          border: "1px solid rgba(255,255,255,0.1)",
          borderRadius: "18px",
          padding: "20px",
          marginBottom: "20px",
        }}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: "16px" }}>
            <span style={{
              fontSize: "10px", fontFamily: "'DM Mono', monospace",
              letterSpacing: "0.15em", textTransform: "uppercase",
              color: "rgba(255,200,80,0.55)",
            }}>
              Batch {String(batchIndex + 1).padStart(2, "0")} · {batch.length} Cards
            </span>

            <button
              onClick={onRemove}
              style={{
                background: "rgba(255,255,255,0.05)",
                border: "1px solid rgba(255,255,255,0.1)",
                borderRadius: "7px",
                color: "rgba(255,255,255,0.35)",
                cursor: "pointer",
                width: "26px", height: "26px",
                display: "flex", alignItems: "center", justifyContent: "center",
                fontSize: "14px", padding: 0,
              }}
            >
              ×
            </button>
          </div>

          {/* Сетка картинок: 2 колонки на мобилках, больше на десктопе */}
          <div style={{ 
            display: "grid", 
            gridTemplateColumns: "repeat(auto-fill, minmax(200px, 1fr))", 
            gap: "16px" 
          }}>
            {batch.map((jokeText, i) => (
              <JokeCardPreview key={i} jokeText={jokeText} index={i} />
            ))}
          </div>
        </div>
      );
    }

    function App() {
      const [input, setInput] = useState("");
      const [batches, setBatches] = useState([]);
      const textareaRef = useRef(null);

      const handlePaste = useCallback(async () => {
        try {
          const text = await navigator.clipboard.readText();
          setInput(text);
        } catch {
          textareaRef.current?.focus();
        }
      }, []);

      const handleClearInput = useCallback(() => setInput(""), []);

      const handleExtract = useCallback(() => {
        if (!input.trim()) return;
        const result = parseOnlyJokes(input);
        if (result.length === 0) return;
        setBatches(prev => [...prev, result]);
        setInput("");
      }, [input]);

      const handleRemoveBatch = useCallback((idx) => {
        setBatches(prev => prev.filter((_, i) => i !== idx));
      }, []);

      const btnBase = {
        border: "1px solid rgba(255,200,80,0.2)",
        borderRadius: "8px",
        background: "rgba(255,200,80,0.07)",
        color: "rgba(255,200,80,0.55)",
        cursor: "pointer",
        padding: "7px 11px",
        fontSize: "13px",
        fontFamily: "'DM Mono', monospace",
        display: "flex", alignItems: "center", gap: "6px",
      };

      return (
        <div style={{
          minHeight: "100vh",
          background: "#0f0e0d",
          backgroundImage: "radial-gradient(ellipse 80% 60% at 50% -10%, rgba(255,200,80,0.07) 0%, transparent 60%)",
          padding: "40px 16px 60px",
          boxSizing: "border-box",
        }}>
          {/* Header */}
          <div style={{ textAlign: "center", marginBottom: "32px" }}>
            <div style={{
              display: "inline-block", fontSize: "10px", fontFamily: "'DM Mono', monospace",
              letterSpacing: "0.2em", color: "rgba(255,200,80,0.6)", textTransform: "uppercase",
              marginBottom: "12px", background: "rgba(255,200,80,0.07)",
              padding: "4px 14px", borderRadius: "20px", border: "1px solid rgba(255,200,80,0.15)",
            }}>
              Image Engine
            </div>
            <h1 style={{
              margin: 0, fontSize: "28px", fontWeight: "600",
              color: "rgba(255,255,255,0.92)", lineHeight: "1.2", letterSpacing: "-0.01em",
            }}>
              Cal Sans Card<br />
              <span style={{ color: "rgb(255,200,80)" }}>Visualizer</span>
            </h1>
          </div>

          {/* Input */}
          <div style={{ maxWidth: "760px", margin: "0 auto 32px" }}>
            <textarea
              ref={textareaRef}
              value={input}
              onChange={e => setInput(e.target.value)}
              placeholder={"Paste your 8 jokes text blocks here..."}
              rows={9}
              style={{
                width: "100%",
                background: "rgba(255,255,255,0.04)",
                border: "1px solid rgba(255,255,255,0.1)",
                borderRadius: "14px",
                padding: "16px",
                color: "rgba(255,255,255,0.82)",
                fontSize: "14px", lineHeight: "1.6",
                transition: "border-color 0.2s",
              }}
            />

            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginTop: "10px" }}>
              <div style={{ display: "flex", gap: "8px" }}>
                <button onClick={handlePaste} title="Paste" style={btnBase}>
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/></svg>
                </button>
                <button onClick={handleClearInput} title="Clear" style={btnBase}>
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" /></svg>
                </button>
              </div>

              <button
                onClick={handleExtract}
                disabled={!input.trim()}
                style={{
                  background: input.trim() ? "rgb(255,200,80)" : "rgba(255,255,255,0.06)",
                  border: "1px solid transparent",
                  borderRadius: "10px",
                  color: input.trim() ? "#1a1500" : "rgba(255,255,255,0.2)",
                  cursor: input.trim() ? "pointer" : "not-allowed",
                  width: "42px", height: "38px",
                  display: "flex", alignItems: "center", justifyContent: "center",
                }}
              >
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><line x1="5" y1="12" x2="19" y2="12" /><polyline points="12 5 19 12 12 19" /></svg>
              </button>
            </div>
          </div>

          {/* Рендер батчей с превьюшками */}
          {batches.length > 0 && (
            <div style={{ maxWidth: "800px", margin: "0 auto" }}>
              {batches.map((batch, batchIdx) => (
                <BatchGroup
                  key={batchIdx}
                  batch={batch}
                  batchIndex={batchIdx}
                  onRemove={() => handleRemoveBatch(batchIdx)}
                />
              ))}
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
