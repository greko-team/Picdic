    * { box-sizing: border-box; }

<body>

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useCallback, useRef } = React;

    // Парсер: берет только тело анекдота (все строчки кроме последней)
    function parseOnlyJokes(text) {
      const blocks = text.trim().split(/\n\s*\n/);
      const jokes = [];
      for (const block of blocks) {
        const lines = block.trim().split("\n").map(l => l.trim()).filter(Boolean);
        if (lines.length < 2) continue;
        
        const jokeLines = lines.slice(0, -1);
        const jokeText = jokeLines.join("\n"); 
        jokes.push(jokeText);
      }
      return jokes;
    }

    function JokeCardPreview({ jokeText, index }) {
      const cardRef = useRef(null);
      const [isDownloading, setIsDownloading] = useState(false);

      const downloadImage = async () => {
        if (!cardRef.current || isDownloading) return;
        setIsDownloading(true);
        try {
          // Рендерим скрытый блок размером ровно 2000x3000 пикселей
          const canvas = await html2canvas(cardRef.current, {
            useCORS: true,
            scale: 1, // Фиксируем масштаб 1к1, так как размеры блока уже 2000х3000
            logging: false,
            width: 2000,
            height: 3000
          });
          
          const dataUrl = canvas.toDataURL("image/png");
          const link = document.createElement("a");
          link.download = `joke-${String(index + 1).padStart(2, "0")}.png`;
          link.href = dataUrl;
          link.click();
        } catch (err) {
          console.error("Ошибка генерации картинки:", err);
        }
        setIsDownloading(false);
      };

      return (
        <div style={{
          background: "rgba(255,255,255,0.04)",
          border: "1px solid rgba(255,255,255,0.08)",
          borderRadius: "14px",
          padding: "16px",
          display: "flex",
          flexDirection: "column",
          gap: "12px",
          alignItems: "center"
        }}>
          {/* Контейнер-превью на экране */}
          <div style={{
            width: "100%",
            maxWidth: "240px",
            height: "360px",
            background: "#ffffff",
            borderRadius: "8px",
            overflow: "hidden",
            boxShadow: "0 10px 30px rgba(0,0,0,0.5)",
            display: "flex",
            alignItems: "center",
            justifyContent: "center",
            padding: "24px"
          }}>
            <p style={{
              margin: 0,
              color: "#000000",
              fontFamily: "'Cal Sans', sans-serif",
              fontSize: "14px",
              fontWeight: "600",
              lineHeight: "1.45",
              textAlign: "center",
              whiteSpace: "pre-line",
              wordBreak: "break-word"
            }}>
              {jokeText}
            </p>
          </div>

          {/* Кнопка скачать */}
          <button
            onClick={downloadImage}
            disabled={isDownloading}
            style={{
              width: "100%",
              maxWidth: "240px",
              background: "rgba(255,200,80,0.1)",
              border: "1px solid rgba(255,200,80,0.3)",
              color: "rgb(255,200,80)",
              borderRadius: "8px",
              padding: "10px",
              fontSize: "12px",
              fontFamily: "'DM Mono', monospace",
              cursor: isDownloading ? "not-allowed" : "pointer",
              transition: "all 0.15s",
              display: "flex",
              alignItems: "center",
              justifyContent: "center",
              gap: "6px"
            }}
          >
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v4M7 10l5 5 5-5M12 15V3"/>
            </svg>
            {isDownloading ? "Generating..." : "Download PNG"}
          </button>

          {/* СКРЫТЫЙ холст холста ровно 2000x3000 для идеального скачивания */}
          <div style={{ position: "absolute", left: "-9999px", top: "-9999px" }}>
            <div 
              ref={cardRef}
              style={{
                width: "2000px",
                height: "3000px",
                background: "#ffffff",
                display: "flex",
                alignItems: "center",
                justifyContent: "center",
                padding: "260px", // Щедрые симметричные отступы от краев
                boxSizing: "border-box"
              }}
            >
              <p style={{
                margin: 0,
                color: "#000000",
                fontFamily: "'Cal Sans', sans-serif",
                fontSize: "125px", // Крупный, жирный, читаемый шрифт, как на эталоне
                fontWeight: "600",
                lineHeight: "1.45",
                textAlign: "center",
                whiteSpace: "pre-line"
              }}>
                {jokeText}
              </p>
            </div>
          </div>
        </div>
      );
    }

    function BatchGroup({ batch, batchIndex, onRemove }) {
      return (
        <div style={{
          background: "rgba(255,255,255,0.025)",
          border: "1px solid rgba(255,255,255,0.1)",
          borderRadius: "18px",
          padding: "20px",
          marginBottom: "20px",
        }}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: "16px" }}>
            <span style={{
              fontSize: "10px", fontFamily: "'DM Mono', monospace",
              letterSpacing: "0.15em", textTransform: "uppercase",
              color: "rgba(255,200,80,0.55)",
            }}>
              Batch {String(batchIndex + 1).padStart(2, "0")} · {batch.length} Cards
            </span>

            <button
              onClick={onRemove}
              style={{
                background: "rgba(255,255,255,0.05)",
                border: "1px solid rgba(255,255,255,0.1)",
                borderRadius: "7px",
                color: "rgba(255,255,255,0.35)",
                cursor: "pointer",
                width: "26px", height: "26px",
                display: "flex", alignItems: "center", justifyContent: "center",
                fontSize: "14px", padding: 0,
              }}
            >
              ×
            </button>
          </div>

          <div style={{ 
            display: "grid", 
            gridTemplateColumns: "repeat(auto-fill, minmax(200px, 1fr))", 
            gap: "16px" 
          }}>
            {batch.map((jokeText, i) => (
              <JokeCardPreview key={i} jokeText={jokeText} index={i} />
            ))}
          </div>
        </div>
      );
    }

    function App() {
      const [input, setInput] = useState("");
      const [batches, setBatches] = useState([]);
      const textareaRef = useRef(null);

      const handlePaste = useCallback(async () => {
        try {
          const text = await navigator.clipboard.readText();
          setInput(text);
        } catch {
          textareaRef.current?.focus();
        }
      }, []);

      const handleClearInput = useCallback(() => setInput(""), []);

      const handleExtract = useCallback(() => {
        if (!input.trim()) return;
        const result = parseOnlyJokes(input);
        if (result.length === 0) return;
        setBatches(prev => [...prev, result]);
        setInput("");
      }, [input]);

      const handleRemoveBatch = useCallback((idx) => {
        setBatches(prev => prev.filter((_, i) => i !== idx));
      }, []);
