<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Anecdote Image Maker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: #0f0e0d;
    background-image: radial-gradient(ellipse 80% 60% at 50% -10%, rgba(255,200,80,0.07) 0%, transparent 60%);
    font-family: Georgia, serif;
    padding: 40px 20px 60px;
    color: rgba(255,255,255,0.9);
  }
  @font-face {
    font-family: 'CalSans';
    src: url('data:font/truetype;base64,AAEAAAARAQAABAAQR0RFRjChNEoAAAMAAAAA+kdQT1PMUycmAABLqAAAkYpHU1VC41exPQAAHugAAAt+T1MvMmEYNtgAAAHsAAAAYGNtYXCsu93HAAAOjAAABlpjdnQgA6oQZgAAAaAAAABKZnBnbWIu/XwAACpoAAAODGdhc3AAAAAQAAABHAAAAAhnbHlmnCsUlAAA3TQAAK+iaGVhZCRM/10AAAFoAAAANmhoZWEHnAb1AAABRAAAACRobXR4DpcnTQAAFOgAAAoAbG9jYV8WMtIAAAP8AAAFCm1heHAD6g8JAAABJAAAACBuYW1lmW3FqgAACQgAAAWEcG9zdF+xWbgAADh0AAATM3ByZXBYvfiZAAACTAAAALI') format('truetype');
    font-weight: bold;
  }
  textarea { resize: vertical; }
  textarea::placeholder { color: rgba(255,255,255,0.18); }
  textarea:focus { outline: none; border-color: rgba(255,200,80,0.35) !important; box-shadow: 0 0 0 3px rgba(255,200,80,0.05); }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }

  .header { text-align: center; margin-bottom: 36px; }
  .badge {
    display: inline-block; font-size: 10px; font-family: monospace;
    letter-spacing: 0.2em; color: rgba(255,200,80,0.6); text-transform: uppercase;
    margin-bottom: 12px; background: rgba(255,200,80,0.07);
    padding: 4px 14px; border-radius: 20px; border: 1px solid rgba(255,200,80,0.15);
  }
  h1 { font-size: clamp(26px,5vw,40px); font-weight: 600; color: rgba(255,255,255,0.92); line-height: 1.2; }
  h1 span { color: rgba(255,200,80,0.85); }
  .subtitle { margin-top: 12px; color: rgba(255,255,255,0.3); font-size: 13px; font-family: monospace; }

  .container { max-width: 760px; margin: 0 auto 32px; }
  textarea.input {
    width: 100%; background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1); border-radius: 14px;
    padding: 18px 20px; color: rgba(255,255,255,0.82);
    font-size: 14px; line-height: 1.7; font-family: Georgia, serif;
  }
  .toolbar { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; }
  .left-btns { display: flex; gap: 8px; }
  .icon-btn {
    background: rgba(255,200,80,0.07); border: 1px solid rgba(255,200,80,0.2);
    border-radius: 8px; color: rgba(255,200,80,0.6); cursor: pointer;
    padding: 7px 11px; font-size: 13px; font-family: monospace;
    display: flex; align-items: center; gap: 6px; transition: all 0.15s;
  }
  .icon-btn:hover { background: rgba(255,200,80,0.15); color: rgba(255,200,80,0.9); border-color: rgba(255,200,80,0.35); }
  .go-btn {
    background: rgb(255,200,80); border: none; border-radius: 10px;
    color: #1a1500; cursor: pointer; width: 42px; height: 38px;
    display: flex; align-items: center; justify-content: center; transition: all 0.15s;
    flex-shrink: 0;
  }
  .go-btn:disabled { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.2); cursor: not-allowed; }
  .go-btn:not(:disabled):hover { background: rgb(255,215,100); }

  .results { max-width: 760px; margin: 0 auto; }
  .results-label {
    font-size: 10px; font-family: monospace; letter-spacing: 0.15em;
    text-transform: uppercase; color: rgba(255,200,80,0.55); margin-bottom: 16px;
  }
  .cards { display: flex; flex-direction: column; gap: 12px; }
  .card {
    background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px; padding: 14px 16px; display: flex; align-items: center; gap: 14px;
  }
  .thumb { width: 70px; height: 105px; object-fit: cover; border-radius: 6px; border: 1px solid rgba(255,255,255,0.1); flex-shrink: 0; }
  .card-info { flex: 1; min-width: 0; }
  .card-num { font-size: 9px; font-family: monospace; color: rgba(255,200,80,0.5); margin-bottom: 5px; letter-spacing: 0.12em; }
  .card-desc {
    font-size: 12px; color: rgba(255,255,255,0.6); line-height: 1.5;
    font-family: Georgia, serif; font-style: italic;
    overflow: hidden; display: -webkit-box;
    -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  }
  .dl-btn {
    background: rgb(255,200,80); border-radius: 9px; color: #1a1500;
    padding: 9px 16px; font-size: 12px; font-weight: 600; font-family: monospace;
    text-decoration: none; display: flex; align-items: center; gap: 6px; flex-shrink: 0;
  }
  .dl-btn:hover { background: rgb(255,215,100); }

  .spinner { animation: spin 0.8s linear infinite; transform-origin: center; }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

  .error-msg {
    background: rgba(255,80,80,0.08); border: 1px solid rgba(255,80,80,0.2);
    border-radius: 10px; padding: 12px 16px; color: rgba(255,120,120,0.9);
    font-size: 13px; font-family: monospace; margin-top: 12px;
  }
</style>
</head>
<body>

<div class="header">
  <div class="badge">Image Generator</div>
  <h1>Anecdote<br><span>Image Maker</span></h1>
  <p class="subtitle">2000×3000 · Bold · White background</p>
</div>

<div class="container">
  <textarea class="input" id="input" rows="10" placeholder="Paste your anecdotes here...

Each joke is a block of text ending with a short description on the last line.
Blocks are separated by blank lines."></textarea>
  <div class="toolbar">
    <div class="left-btns">
      <button class="icon-btn" onclick="handlePaste()" title="Paste">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/>
          <rect x="8" y="2" width="8" height="4" rx="1" ry="1"/>
        </svg>
      </button>
      <button class="icon-btn" onclick="handleClear()" title="Clear">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <button class="go-btn" id="goBtn" onclick="handleExtract()" disabled>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
      </svg>
    </button>
  </div>
  <div id="errorMsg" class="error-msg" style="display:none;"></div>
</div>

<div class="results" id="results" style="display:none;">
  <div class="results-label" id="resultsLabel"></div>
  <div class="cards" id="cards"></div>
</div>

<script>
// ─── PARSER (same logic as Tool 1) ───────────────────────────────────────────
// Format: blocks separated by blank lines.
// Within each block the LAST line is the short description; everything before it is the joke.
// Supports the "new format" from Tool 1 where a short block right after a long block
// is treated as the description block.

function parseJokes(text) {
  const blocks = text.trim().split(/\n[ \t]*\n/).map(b => b.trim()).filter(Boolean);
  const jokes = [];
  let i = 0;

  while (i < blocks.length) {
    const curr = blocks[i];
    const currLines = curr.split('\n').map(l => l.trim()).filter(Boolean);

    // NEW FORMAT: next block is short (≤150 chars, ≤3 lines) and curr is long → treat next as description
    if (i + 1 < blocks.length) {
      const next = blocks[i + 1];
      const nextLines = next.split('\n').map(l => l.trim()).filter(Boolean);
      const nextIsShort = next.length <= 150 && nextLines.length <= 3;
      const currIsLong  = curr.length > 100;

      if (currIsLong && nextIsShort) {
        jokes.push({ jokeText: curr, description: nextLines.join(' ') });
        i += 2;
        continue;
      }
    }

    // OLD FORMAT: last line of block = description, rest = joke
    if (currLines.length >= 2) {
      const description = currLines[currLines.length - 1];
      const jokeText    = currLines.slice(0, -1).join(' ');
      jokes.push({ jokeText, description });
    }
    i++;
  }

  return jokes;
}

// ─── IMAGE GENERATOR ─────────────────────────────────────────────────────────
const IMG_W = 2000;
const IMG_H = 3000;
const PAD   = 160; // equal padding on all sides

async function generateImage(jokeText) {
  const canvas = document.createElement('canvas');
  canvas.width  = IMG_W;
  canvas.height = IMG_H;
  const ctx = canvas.getContext('2d');

  // White background
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, IMG_W, IMG_H);

  const maxW = IMG_W - PAD * 2;
  const maxH = IMG_H - PAD * 2;

  // Word-wrap helper
  function wrapText(txt, fontSize) {
    ctx.font = `bold ${fontSize}px 'CalSans', Georgia, serif`;
    const words = txt.split(' ');
    const lines = [];
    let line = '';
    for (const word of words) {
      const test = line ? line + ' ' + word : word;
      if (ctx.measureText(test).width > maxW && line) {
        lines.push(line);
        line = word;
      } else {
        line = test;
      }
    }
    if (line) lines.push(line);
    return lines;
  }

  // Binary-search the largest font size that fits
  let lo = 40, hi = 220, bestSize = lo, bestLines = wrapText(jokeText, lo);
  while (lo <= hi) {
    const mid = Math.floor((lo + hi) / 2);
    const lines = wrapText(jokeText, mid);
    const totalH = lines.length * mid * 1.25;
    if (totalH <= maxH) {
      bestSize  = mid;
      bestLines = lines;
      lo = mid + 1;
    } else {
      hi = mid - 1;
    }
  }

  const lineH   = bestSize * 1.25;
  const totalH  = bestLines.length * lineH;
  const startY  = PAD + (maxH - totalH) / 2 + bestSize * 0.82;

  ctx.fillStyle = '#000000';
  ctx.font      = `bold ${bestSize}px 'CalSans', Georgia, serif`;
  ctx.textAlign = 'center';

  bestLines.forEach((line, idx) => {
    ctx.fillText(line, IMG_W / 2, startY + idx * lineH);
  });

  return canvas.toDataURL('image/png');
}

// ─── UI HELPERS ───────────────────────────────────────────────────────────────
function updateBtn() {
  document.getElementById('goBtn').disabled = !document.getElementById('input').value.trim();
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.style.display = msg ? 'block' : 'none';
}

function setLoading(on) {
  const btn = document.getElementById('goBtn');
  if (on) {
    btn.innerHTML = `<svg class="spinner" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 2a10 10 0 0 1 10 10"/></svg>`;
    btn.disabled = true;
  } else {
    btn.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>`;
    updateBtn();
  }
}

async function handlePaste() {
  try {
    const text = await navigator.clipboard.readText();
    document.getElementById('input').value = text;
    updateBtn();
  } catch { document.getElementById('input').focus(); }
}

function handleClear() {
  document.getElementById('input').value = '';
  document.getElementById('results').style.display = 'none';
  showError('');
  updateBtn();
}

async function handleExtract() {
  const input = document.getElementById('input').value;
  if (!input.trim()) return;

  showError('');
  setLoading(true);

  try {
    const jokes = parseJokes(input);

    if (!jokes.length) {
      showError('No jokes found. Make sure each block has at least two lines (joke + description) and blocks are separated by blank lines.');
      return;
    }

    const cardsEl = document.getElementById('cards');
    cardsEl.innerHTML = '';
    document.getElementById('resultsLabel').textContent =
      jokes.length + ' image' + (jokes.length !== 1 ? 's' : '') + ' ready';
    document.getElementById('results').style.display = 'block';

    for (let i = 0; i < jokes.length; i++) {
      const { jokeText, description } = jokes[i];
      const src = await generateImage(jokeText);
      const num = String(i + 1).padStart(2, '0');

      const div = document.createElement('div');
      div.className = 'card';
      div.innerHTML = `
        <img class="thumb" src="${src}" alt="Joke ${num}" />
        <div class="card-info">
          <div class="card-num">${num} · 2000×3000 PNG</div>
          <p class="card-desc">${esc(description)}</p>
        </div>
        <a class="dl-btn" href="${src}" download="joke-${num}.png">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          PNG
        </a>`;
      cardsEl.appendChild(div);
    }
  } finally {
    setLoading(false);
  }
}

function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

document.getElementById('input').addEventListener('input', updateBtn);
</script>
</body>
</html>
