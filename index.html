<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cal Sans Card Visualizer</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link href="https://fonts.cdnfonts.com/css/cal-sans" rel="stylesheet">

  <style>
    * { box-sizing: border-box; }
    body { 
      margin: 0; padding: 0; 
      background: #0f0e0d; 
      color: #fff; 
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      background-image: radial-gradient(ellipse 80% 60% at 50% -10%, rgba(255,200,80,0.07) 0%, transparent 60%);
      padding: 40px 16px 60px;
    }
    .header { text-align: center; margin-bottom: 32px; }
    .badge {
      display: inline-block; fontSize: 10px; font-family: 'DM Mono', monospace;
      letter-spacing: 0.2em; color: rgba(255,200,80,0.6); text-transform: uppercase;
      margin-bottom: 12px; background: rgba(255,200,80,0.07);
      padding: 4px 14px; border-radius: 20px; border: 1px solid rgba(255,200,80,0.15);
    }
    h1 { margin: 0; font-size: 28px; font-weight: 600; color: rgba(255,255,255,0.92); line-height: 1.2; letter-spacing: -0.01em; }
    h1 span { color: rgb(255,200,80); }
    
    .container { maxWidth: 760px; margin: 0 auto 32px; }
    textarea {
      width: 100%; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px; padding: 16px; color: rgba(255,255,255,0.82); font-size: 14px; line-height: 1.6;
      transition: border-color 0.2s; resize: vertical;
    }
    textarea:focus { outline: none; border-color: rgba(255,200,80,0.35); box-shadow: 0 0 0 3px rgba(255,200,80,0.05); }
    
    .controls { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; }
    .btn-group { display: flex; gap: 8px; }
    .btn-base {
      border: 1px solid rgba(255,200,80,0.2); border-radius: 8px; background: rgba(255,200,80,0.07);
      color: rgba(255,200,80,0.55); cursor: pointer; padding: 7px 11px; font-size: 13px; font-family: 'DM Mono', monospace;
      display: flex; align-items: center; gap: 6px; transition: all 0.15s;
    }
    .btn-extract {
      background: rgba(255,255,255,0.06); border: 1px solid transparent; border-radius: 10px;
      color: rgba(255,255,255,0.2); cursor: not-allowed; width: 42px; height: 38px;
      display: flex; align-items: center; justify-content: center; transition: all 0.15s;
    }
    .btn-extract.active { background: rgb(255,200,80); color: #1a1500; cursor: pointer; }
    
    .batch-group {
      background: rgba(255,255,255,0.025); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 18px; padding: 20px; margin-bottom: 20px; max-width: 800px; margin-left: auto; margin-right: auto;
    }
    .batch-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .batch-title { font-size: 10px; font-family: 'DM Mono', monospace; letter-spacing: 0.15em; text-transform: uppercase; color: rgba(255,200,80,0.55); }
    .btn-close {
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 7px;
      color: rgba(255,255,255,0.35); cursor: pointer; width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; font-size: 14px; padding: 0;
    }
    
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; }
    .card-preview {
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 14px;
      padding: 16px; display: flex; flex-direction: column; gap: 12px; align-items: center;
    }
    .preview-box {
      width: 100%; max-width: 240px; height: 360px; background: #ffffff; border-radius: 8px;
      overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); position: relative;
      display: flex; align-items: center; justify-content: center; padding: 30px;
    }
    .preview-text {
      margin: 0; color: #000000; font-family: 'Cal Sans', sans-serif; font-size: 14px;
      font-weight: 600; line-height: 1.45; text-align: center; white-space: pre-line; word-break: break-word;
    }
    .btn-download {
      width: 100%; max-width: 240px; background: rgba(255,200,80,0.1); border: 1px solid rgba(255,200,80,0.3);
      color: rgb(255,200,80); border-radius: 8px; padding: 10px; font-size: 12px; font-family: 'DM Mono', monospace;
      cursor: pointer; transition: all 0.15s; display: flex; align-items: center; justify-content: center; gap: 6px;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="badge">Image Engine</div>
    <h1>Cal Sans Card<br><span>Visualizer</span></h1>
  </div>

  <div class="container">
    <textarea id="jokeInput" rows="9" placeholder="Paste your 8 jokes text blocks here..."></textarea>
    <div class="controls">
      <div class="btn-group">
        <button class="btn-base" id="btnPaste" title="Paste">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/></svg>
        </button>
        <button class="btn-base" id="btnClear" title="Clear">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" /></svg>
        </button>
      </div>
      <button class="btn-extract" id="btnExtract" disabled>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="5" y1="12" x2="19" y2="12" /><polyline points="12 5 19 12 12 19" /></svg>
      </button>
    </div>
  </div>

  <div id="outputContainer"></div>

  <script>
    const jokeInput = document.getElementById('jokeInput');
    const btnExtract = document.getElementById('btnExtract');
    const btnPaste = document.getElementById('btnPaste');
    const btnClear = document.getElementById('btnClear');
    const outputContainer = document.getElementById('outputContainer');

    let batchCount = 0;

    jokeInput.addEventListener('input', () => {
      if (jokeInput.value.trim()) {
        btnExtract.removeAttribute('disabled');
        btnExtract.classList.add('active');
      } else {
        btnExtract.setAttribute('disabled', 'true');
        btnExtract.classList.remove('active');
      }
    });

    btnClear.addEventListener('click', () => {
      jokeInput.value = '';
      btnExtract.setAttribute('disabled', 'true');
      btnExtract.classList.remove('active');
    });

    btnPaste.addEventListener('click', async () => {
      try {
        const text = await navigator.clipboard.readText();
        jokeInput.value = text;
        btnExtract.removeAttribute('disabled');
        btnExtract.classList.add('active');
      } catch (e) {
        jokeInput.focus();
      }
    });

    function parseOnlyJokes(text) {
      const blocks = text.trim().split(/\n\s*\n/);
      const jokes = [];
      for (const block of blocks) {
        const lines = block.trim().split("\n").map(l => l.trim()).filter(Boolean);
        if (lines.length < 2) continue;
        const jokeLines = lines.slice(0, -1);
        jokes.push(jokeLines.join("\n"));
      }
      return jokes;
    }

    btnExtract.addEventListener('click', () => {
      const text = jokeInput.value;
      if (!text.trim()) return;

      const jokes = parseOnlyJokes(text);
      if (jokes.length === 0) return;

      batchCount++;
      createBatchDOM(jokes, batchCount);
      jokeInput.value = '';
      btnExtract.setAttribute('disabled', 'true');
      btnExtract.classList.remove('active');
    });

    function createBatchDOM(jokes, index) {
      const batchEl = document.createElement('div');
      batchEl.className = 'batch-group';

      const headerEl = document.createElement('div');
      headerEl.className = 'batch-header';
      headerEl.innerHTML = `
        <span class="batch-title">Batch ${String(index).padStart(2, '0')} · ${jokes.length} Cards</span>
        <button class="btn-close">×</button>
      `;
      headerEl.querySelector('.btn-close').addEventListener('click', () => batchEl.remove());
      batchEl.appendChild(headerEl);

      const gridEl = document.createElement('div');
      gridEl.className = 'grid';

      jokes.forEach((jokeText, i) => {
        const cardEl = document.createElement('div');
        cardEl.className = 'card-preview';

        const previewBox = document.createElement('div');
        previewBox.className = 'preview-box';
        previewBox.innerHTML = `<p class="preview-text">${escapeHtml(jokeText)}</p>`;

        const downloadBtn = document.createElement('button');
        downloadBtn.className = 'btn-download';
        downloadBtn.innerHTML = `
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v4M7 10l5 5 5-5M12 15V3"/>
          </svg> Download PNG
        `;

        downloadBtn.addEventListener('click', () => generateHighResImage(jokeText, i + 1));

        cardEl.appendChild(previewBox);
        cardEl.appendChild(downloadBtn);
        gridEl.appendChild(cardEl);
      });

      batchEl.appendChild(gridEl);
      outputContainer.insertBefore(batchEl, outputContainer.firstChild);
    }

    function generateHighResImage(text, number) {
      // Идеальное холст-разрешение 2000х3000 через SVG blob векторную отрисовку (работает без внешних библиотек)
      const width = 2000;
      const height = 3000;
      
      // Форматируем текст, заменяя переносы строк на теги для SVG
      const lines = text.split('\n');
      let tspanContent = '';
      lines.forEach((line) => {
        tspanContent += `<tspan x="1000" dy="1.45em">${escapeHtml(line)}</tspan>`;
      });

      const svgString = `
        <svg xmlns="http://www.w3.org/2000/svg" width="${width}" height="${height}" viewBox="0 0 ${width} ${height}">
          <style>
            @import url('https://fonts.cdnfonts.com/css/cal-sans');
            .bg { fill: #ffffff; }
            .txt { 
              font-family: 'Cal Sans', sans-serif; 
              font-size: 64px; 
              font-weight: 600; 
              fill: #000000; 
              text-anchor: middle;
            }
          </style>
          <rect width="100%" height="100%" class="bg" />
          <text y="1100" class="txt">${tspanContent}</text>
        </svg>
      `;

      const img = new Image();
      const svgBlob = new Blob([svgString], { type: 'image/svg+xml;charset=utf-8' });
      const url = URL.createObjectURL(svgBlob);

      img.onload = function() {
        const canvas = document.createElement('canvas');
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0);
        
        const pngUrl = canvas.toDataURL('image/png');
        const downloadLink = document.createElement('a');
        downloadLink.href = pngUrl;
        downloadLink.download = `joke-card-${String(number).padStart(2, '0')}.png`;
        downloadLink.click();
        
        URL.revokeObjectURL(url);
      };

      img.src = url;
    }

    function escapeHtml(text) {
      return text
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }
  </script>
</body>
</html>
